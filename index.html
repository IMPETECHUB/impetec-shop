<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC | Panel de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --sys-blue: #0056b3; --sys-dark: #1a1d21; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }

        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: skeleton-load 1.5s infinite; }
        @keyframes skeleton-load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .product-card { background: white; border: 1px solid #e2e8f0; border-radius: 8px; transition: all 0.2s ease; display: flex; flex-direction: column; height: 100%; }
        .product-card:hover { border-color: var(--sys-blue); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        #sidebar, #cart-sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1100; }
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; z-index: 1050; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <nav class="sticky top-0 z-[1000] bg-white border-b-4 border-blue-700 shadow-md">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-700">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <img src="logo.png" onclick="location.reload()" class="h-10 cursor-pointer hidden sm:block" alt="IMPETEC">
            </div>

            <div class="flex-1 max-w-2xl relative">
                <input type="text" id="search-input" placeholder="Buscar modelo o producto..." 
                       class="w-full pl-4 pr-12 py-2.5 border-2 border-slate-200 rounded-lg focus:border-blue-600 outline-none font-medium">
                <button onclick="ejecutarBusqueda()" class="absolute right-0 top-0 h-full px-4 text-blue-700 hover:bg-blue-50 rounded-r-lg border-l border-slate-200">
                    <i class="fas fa-search"></i>
                </button>
            </div>

            <button onclick="toggleCart()" class="relative p-3 bg-blue-50 text-blue-700 rounded-full hover:bg-blue-100">
                <i class="fas fa-shopping-cart text-lg"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold border-2 border-white">0</span>
            </button>
        </div>
    </nav>

    <aside id="sidebar" class="fixed left-0 top-0 h-full bg-white shadow-2xl transform -translate-x-full overflow-y-auto w-72">
        <div class="bg-slate-900 text-white p-6 flex justify-between items-center">
            <h2 class="font-black text-lg">IMPETEC</h2>
            <button onclick="toggleSidebar()"><i class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="p-4 space-y-1 text-sm">
            <div class="text-[11px] font-black text-slate-400 px-3 py-2 uppercase tracking-widest">Soporte</div>
            <a href="https://wa.me/524772471293" target="_blank" class="flex items-center gap-3 px-3 py-3 font-bold text-blue-700 hover:bg-blue-50 rounded-lg">
                <i class="fas fa-headset"></i> Soporte de Ingeniería
            </a>
            <div class="text-[11px] font-black text-slate-400 px-3 py-2 uppercase tracking-widest mt-4">Categorías</div>
            <button onclick="filtrar('21', 'Videovigilancia')" class="w-full flex items-center gap-3 px-3 py-3 text-slate-600 hover:bg-slate-50 hover:text-blue-700 rounded-lg">
                <i class="fas fa-video w-5"></i> Videovigilancia
            </button>
            <button onclick="filtrar('22', 'Redes')" class="w-full flex items-center gap-3 px-3 py-3 text-slate-600 hover:bg-slate-50 hover:text-blue-700 rounded-lg">
                <i class="fas fa-wifi w-5"></i> Redes e Inalámbricos
            </button>
            <button onclick="filtrar('23', 'Control de Acceso')" class="w-full flex items-center gap-3 px-3 py-3 text-slate-600 hover:bg-slate-50 hover:text-blue-700 rounded-lg">
                <i class="fas fa-fingerprint w-5"></i> Control de Acceso
            </button>
        </nav>
    </aside>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 id="section-title" class="text-3xl font-black text-slate-900 tracking-tight uppercase">Catálogo de Ingeniería</h1>
                <p class="text-slate-500 text-xs font-bold mt-1">Precio Unitario Neto (TC: $18.50)</p>
            </div>
            <select id="price-filter" onchange="ordenarProductos()" class="bg-white border-2 border-slate-200 rounded-lg px-4 py-2 text-xs font-bold outline-none">
                <option value="default">Relevancia</option>
                <option value="low">Precio: Menor a Mayor</option>
                <option value="high">Precio: Mayor a Menor</option>
            </select>
        </header>

        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <aside id="cart-sidebar" class="fixed right-0 top-0 h-full bg-white shadow-2xl transform translate-x-full flex flex-col w-80 max-w-[90vw]">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-black text-sm text-slate-800">PRESUPUESTO</h3>
            <button onclick="toggleCart()"><i class="fas fa-times text-slate-400"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-6 border-t bg-slate-50 space-y-4">
            <div class="flex justify-between font-black text-xl text-slate-900">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="enviarPedidoWA()" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> ENVIAR COTIZACIÓN
            </button>
        </div>
    </aside>

    <script>
        const CONFIG = {
            sys_key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            sys_secret: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            waVentas: "524776767350",
            tc: 18.50,
            divisor: 0.88,
            iva: 1.16
        };

        let sysToken = '';
        let productosActuales = [];
        let cart = JSON.parse(localStorage.getItem('impetec_cart')) || [];

        async function init() {
            actualizarUI();
            try {
                const res = await fetch('https://developers.syscom.mx/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ client_id: CONFIG.sys_key, client_secret: CONFIG.sys_secret, grant_type: 'client_credentials' })
                });
                const data = await res.json();
                sysToken = data.access_token;
                buscar('Hikvision');
            } catch (e) { errorState(); }
        }

        async function filtrar(id, nombre) {
            closeAll(); showLoading();
            document.getElementById('section-title').innerText = nombre;
            try {
                const res = await fetch(`https://developers.syscom.mx/api/v1/productos?categoria=${id}`, {
                    headers: { 'Authorization': `Bearer ${sysToken}` }
                });
                const data = await res.json();
                productosActuales = data.productos || [];
                if (productosActuales.length === 0) return buscar(nombre);
                render(productosActuales);
            } catch (e) { errorState(); }
        }

        async function buscar(q) {
            showLoading();
            document.getElementById('section-title').innerText = q;
            try {
                const res = await fetch(`https://developers.syscom.mx/api/v1/productos?busqueda=${encodeURIComponent(q)}`, {
                    headers: { 'Authorization': `Bearer ${sysToken}` }
                });
                const data = await res.json();
                productosActuales = data.productos || [];
                render(productosActuales);
            } catch (e) { errorState(); }
        }

        function getPrice(p) {
            // FÓRMULA SOLICITADA: (Precio a nosotros / .88) * 1.16
            // Se asume que 'p.precios.precio_especial' es el precio distribuidor en USD
            const precioNosotrosUSD = parseFloat(p.precios.precio_especial || p.precios.precio_lista);
            const precioNosotrosMXN = precioNosotrosUSD * CONFIG.tc;
            return (precioNosotrosMXN / CONFIG.divisor) * CONFIG.iva;
        }

        function render(productos) {
            const grid = document.getElementById('products-grid');
            if (productos.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">Sin resultados.</div>`;
                return;
            }

            grid.innerHTML = productos.map(p => {
                const precio = getPrice(p);
                const stock = p.existencia.total || 0;
                const stockColor = stock > 0 ? 'text-green-600' : 'text-red-600';
                
                return `
                    <div class="product-card p-4">
                        <div class="relative h-44 mb-4 flex items-center justify-center bg-white">
                            <img src="${p.img_portada}" loading="lazy" class="max-h-full object-contain">
                            <span class="absolute top-0 left-0 bg-slate-900 text-white text-[9px] font-black px-2 py-1 rounded uppercase">${p.marca}</span>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-1">
                                <p class="text-blue-700 text-[10px] font-black uppercase">${p.modelo}</p>
                                <p class="text-[10px] font-bold ${stockColor}">Stock: ${stock}</p>
                            </div>
                            <h4 class="text-sm font-bold text-slate-800 line-clamp-2 h-10 mb-2">${p.titulo}</h4>
                            <p class="text-2xl font-black text-slate-900">$${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
                        </div>
                        <div class="mt-4 space-y-2">
                            <button onclick="addToCart('${p.modelo}', '${p.titulo.replace(/'/g, "")}', ${precio}, '${p.img_portada}')" 
                                    class="w-full bg-slate-900 text-white py-3 rounded-lg font-black text-[11px] hover:bg-blue-700 transition-all uppercase">
                                + Añadir al Presupuesto
                            </button>
                            <button onclick="ventasDirecto('${p.modelo}')" 
                                    class="w-full border-2 border-green-500 text-green-600 py-2 rounded-lg font-bold text-[10px] flex items-center justify-center gap-2">
                                <i class="fab fa-whatsapp"></i> Consultar Ventas
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(mod, tit, price, img) {
            const index = cart.findIndex(i => i.modelo === mod);
            if (index > -1) cart[index].cant++;
            else cart.push({ modelo: mod, titulo: tit, precio: price, img: img, cant: 1 });
            saveCart();
            if(window.innerWidth > 1024) toggleCart();
        }

        function saveCart() {
            localStorage.setItem('impetec_cart', JSON.stringify(cart));
            actualizarUI();
        }

        function actualizarUI() {
            const itemsCont = document.getElementById('cart-items');
            let total = 0, count = 0;
            itemsCont.innerHTML = cart.map((i, idx) => {
                total += i.precio * i.cant;
                count += i.cant;
                return `
                    <div class="flex gap-3 items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <img src="${i.img}" class="w-12 h-12 object-contain bg-white rounded">
                        <div class="flex-1 text-[11px]">
                            <p class="font-black">${i.modelo}</p>
                            <p class="text-slate-500">$${i.precio.toLocaleString()} x ${i.cant}</p>
                        </div>
                        <button onclick="removeItem(${idx})" class="text-slate-300 hover:text-red-500 p-1"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('cart-count').innerText = count;
        }

        function removeItem(idx) { cart.splice(idx, 1); saveCart(); }

        function enviarPedidoWA() {
            if (cart.length === 0) return alert("Presupuesto vacío");
            let mensaje = "Solicitud de Cotización IMPETEC:%0A%0A";
            cart.forEach(i => { mensaje += `• ${i.modelo} (${i.cant} pz)%0A`; });
            mensaje += `%0A*Total: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/${CONFIG.waVentas}?text=${mensaje}`);
        }

        function ventasDirecto(mod) {
            window.open(`https://wa.me/${CONFIG.waVentas}?text=Hola, solicito información del modelo: ${mod}`);
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function toggleCart() {
            const s = document.getElementById('cart-sidebar');
            const o = document.getElementById('overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function closeAll() {
            document.getElementById('sidebar').style.transform = 'translateX(-100%)';
            document.getElementById('cart-sidebar').style.transform = 'translateX(100%)';
            document.getElementById('overlay').style.display = 'none';
        }

        function showLoading() {
            document.getElementById('products-grid').innerHTML = Array(8).fill('<div class="h-80 skeleton rounded-xl"></div>').join('');
        }

        function ordenarProductos() {
            const val = document.getElementById('price-filter').value;
            if(val === 'low') productosActuales.sort((a, b) => getPrice(a) - getPrice(b));
            if(val === 'high') productosActuales.sort((a, b) => getPrice(b) - getPrice(a));
            render(productosActuales);
        }

        function ejecutarBusqueda() {
            const q = document.getElementById('search-input').value;
            if(q) buscar(q);
        }

        function errorState() {
            document.getElementById('products-grid').innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-red-500 font-bold italic">Error de conexión API</p></div>`;
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') ejecutarBusqueda(); });

        init();
    </script>
</body>
</html>
