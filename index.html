<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC | Distribuidor Autorizado Syscom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --sys-blue: #0056b3; --sys-dark: #1a1d21; --sys-gray: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #333; }

        /* SIDEBAR RÉPLICA EXACTA SYSCOM */
        #sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; width: 320px; background: white; border-right: 1px solid #ddd; }
        .sidebar-header { background: var(--sys-dark); color: white; padding: 20px; }
        
        .nav-group-title { background: #e2e8f0; color: #475569; padding: 10px 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #cbd5e1; }
        .nav-item { display: flex; align-items: center; padding: 10px 20px; font-size: 13px; font-weight: 600; color: #334155; border-bottom: 1px solid #f1f5f9; transition: 0.2s; width: 100%; text-align: left; }
        .nav-item:hover { background: #f0f7ff; color: var(--sys-blue); padding-left: 25px; }
        .nav-item i { width: 22px; color: #94a3b8; margin-right: 8px; font-size: 14px; }
        
        .sub-nav-item { padding: 8px 20px 8px 45px; font-size: 12px; color: #64748b; display: block; width: 100%; text-align: left; border-bottom: 1px solid #f8fafc; }
        .sub-nav-item:hover { color: var(--sys-blue); background: #f1f5f9; }

        #cart-sidebar { transition: all 0.4s ease; z-index: 1000; width: 380px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .sidebar-overlay { background: rgba(0,0,0,0.5); display: none; z-index: 900; backdrop-filter: blur(4px); }
        
        .product-card { transition: all 0.3s; background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--sys-blue); }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); transition: 0.3s; z-index: 2000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay fixed inset-0" onclick="closeAll()"></div>

    <div id="toast" class="bg-blue-700 text-white px-8 py-4 rounded-xl shadow-2xl flex items-center gap-4">
        <i class="fas fa-check-circle"></i>
        <span class="text-xs font-bold uppercase tracking-widest text-white">Añadido al presupuesto</span>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full transform -translate-x-full overflow-y-auto flex flex-col shadow-2xl">
        <div class="sidebar-header">
            <div class="flex justify-between items-center">
                <span class="font-extrabold text-xl italic">IMPETEC <span class="text-blue-500">PRO</span></span>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <nav class="flex-1 pb-10">
            <div class="nav-group-title">Ingenierías</div>
            <button onclick="filtrar('Videovigilancia')" class="nav-item"><i class="fas fa-video"></i> Videovigilancia</button>
            <button onclick="filtrar('Redes')" class="nav-item"><i class="fas fa-wifi"></i> Redes e Inalámbricos</button>
            <button onclick="filtrar('Acceso')" class="nav-item"><i class="fas fa-fingerprint"></i> Control de Acceso</button>
            <button onclick="filtrar('Intrusión')" class="nav-item"><i class="fas fa-shield-alt"></i> Alarmas e Intrusión</button>
            <button onclick="filtrar('Energía')" class="nav-item"><i class="fas fa-bolt"></i> Energía y Solar</button>

            <div class="nav-group-title">Tipos de Cámaras</div>
            <button onclick="filtrar('Cámara IP')" class="sub-nav-item">• Cámaras IP</button>
            <button onclick="filtrar('Cámara Análoga')" class="sub-nav-item">• Cámaras Análogas (TurboHD)</button>
            <button onclick="filtrar('Cámara PTZ')" class="sub-nav-item">• Cámaras PTZ (Robóticas)</button>
            <button onclick="filtrar('Cámara Térmica')" class="sub-nav-item">• Cámaras Térmicas</button>
            <button onclick="filtrar('Cámara WiFi')" class="sub-nav-item">• Cámaras WiFi / Residenciales</button>

            <div class="nav-group-title">Marcas Líderes</div>
            <button onclick="filtrar('Hikvision')" class="nav-item font-bold text-red-600 italic">HIKVISION</button>
            <button onclick="filtrar('Epcom')" class="nav-item font-bold text-blue-800 italic">EPCOM</button>
            <button onclick="filtrar('Ubiquiti')" class="nav-item font-bold text-blue-400 italic">UBIQUITI</button>
            <button onclick="filtrar('Dahua')" class="nav-item font-bold text-orange-600 italic">DAHUA</button>
            <button onclick="filtrar('Western Digital')" class="nav-item font-bold text-blue-900 italic">WD (Discos Duros)</button>

            <div class="nav-group-title">Atención Directa</div>
            <a href="https://wa.me/524772471293?text=Hola%20equipo%20de%20Soporte%20T%C3%A9cnico%2C%20buen%20d%C3%ADa.%20Solicito%20su%20amable%20apoyo%20con%20una%20duda%20sobre%20un%20proyecto%20de%20ingenier%C3%ADa." 
               target="_blank" class="nav-item text-blue-600 font-bold">
                <i class="fas fa-headset text-blue-600"></i> Soporte de Ingeniería
            </a>
        </nav>
    </aside>

    <aside id="cart-sidebar" class="fixed right-0 top-0 h-full bg-white transform translate-x-full flex flex-col shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <div>
                <h3 class="font-black text-lg">PRESUPUESTO</h3>
                <p id="items-total-count" class="text-[10px] font-bold text-blue-600 uppercase">0 Artículos</p>
            </div>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll"></div>
        <div class="p-6 border-t bg-white space-y-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center">
                <span class="font-bold text-gray-400 text-sm italic">Total estimado:</span>
                <span class="text-2xl font-black text-slate-900" id="cart-total">$0.00</span>
            </div>
            <button onclick="enviarPedidoWA()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-green-700 transition-all shadow-xl flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-lg"></i> Solicitar a Ventas
            </button>
        </div>
    </aside>

    <nav class="bg-white border-b sticky top-0 z-[100] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-6">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                    <i class="fas fa-bars"></i>
                </button>
                <img src="logo.png" onclick="irAlInicio()" class="h-8 cursor-pointer hidden md:block">
            </div>
            <div class="flex-1 max-w-xl mx-8">
                <div class="relative group">
                    <input type="text" id="search-input" placeholder="Buscar modelo, marca o solución..." class="w-full bg-gray-100 border-2 border-transparent rounded-xl py-2 px-10 font-medium text-sm focus:bg-white focus:border-blue-500 outline-none transition-all">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500"></i>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition-all">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[9px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <header class="mb-10 flex items-baseline justify-between border-b pb-6">
            <h2 class="text-3xl font-black text-gray-900 tracking-tight" id="section-title">Cargando Catálogo...</h2>
            <div id="loading-spinner" class="hidden animate-pulse text-blue-600 font-bold text-xs uppercase tracking-widest">Sincronizando con Syscom...</div>
        </header>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="products-grid"></div>
    </main>

    <script>
        const CONFIG = {
            sys_key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            sys_secret: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            waVentas: "524776767350",
            waSoporte: "524772471293",
            tc: 18.50,
            margen: 0.80
        };

        let sysToken = '';
        let cart = [];

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('sidebar-overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function toggleCart() {
            const s = document.getElementById('cart-sidebar');
            const o = document.getElementById('sidebar-overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function closeAll() {
            document.getElementById('sidebar').style.transform = 'translateX(-100%)';
            document.getElementById('cart-sidebar').style.transform = 'translateX(100%)';
            document.getElementById('sidebar-overlay').style.display = 'none';
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function addToCart(mod, tit, price, img) {
            const safeTitle = tit.replace(/['"]/g, "");
            const item = cart.find(i => i.modelo === mod);
            if (item) item.cant++;
            else cart.push({ modelo: mod, titulo: safeTitle, precio: price, img: img, cant: 1 });
            actualizarUI();
            showToast();
        }

        function updateQuantity(mod, delta) {
            const item = cart.find(i => i.modelo === mod);
            if (item) {
                item.cant += delta;
                if (item.cant < 1) cart = cart.filter(i => i.modelo !== mod);
                actualizarUI();
            }
        }

        function actualizarUI() {
            const container = document.getElementById('cart-items');
            const totalLabel = document.getElementById('cart-total');
            const countLabel = document.getElementById('cart-count');
            const itemsHeader = document.getElementById('items-total-count');
            let total = 0; let count = 0;

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-gray-400 text-xs font-bold italic">No hay productos seleccionados</p>';
            } else {
                container.innerHTML = cart.map(item => {
                    total += item.precio * item.cant;
                    count += item.cant;
                    return `
                        <div class="bg-white p-4 rounded-xl border flex gap-3 items-center">
                            <img src="${item.img}" class="w-12 h-12 object-contain bg-gray-50 rounded p-1">
                            <div class="flex-1">
                                <h5 class="text-[10px] font-bold leading-tight line-clamp-2">${item.titulo}</h5>
                                <p class="text-[10px] font-black text-blue-600">${item.modelo}</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <button onclick="updateQuantity('${item.modelo}', -1)" class="w-5 h-5 bg-gray-100 rounded text-[10px]">-</button>
                                    <span class="text-xs font-bold">${item.cant}</span>
                                    <button onclick="updateQuantity('${item.modelo}', 1)" class="w-5 h-5 bg-gray-100 rounded text-[10px]">+</button>
                                </div>
                            </div>
                            <p class="text-xs font-black">$${(item.precio * item.cant).toLocaleString('es-MX')}</p>
                        </div>
                    `;
                }).join('');
            }
            countLabel.innerText = count;
            itemsHeader.innerText = `${count} Artículos`;
            totalLabel.innerText = `$${total.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
        }

        async function authSYSCOM() {
            try {
                const res = await fetch('https://developers.syscom.mx/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ client_id: CONFIG.sys_key, client_secret: CONFIG.sys_secret, grant_type: 'client_credentials' })
                });
                const data = await res.json();
                sysToken = data.access_token;
                return true;
            } catch (e) { return false; }
        }

        async function buscar(q) {
            if (!sysToken) await authSYSCOM();
            document.getElementById('loading-spinner').classList.remove('hidden');
            const query = q || 'Hikvision';
            try {
                const res = await fetch(`https://developers.syscom.mx/api/v1/productos?busqueda=${query}`, { 
                    headers: { 'Authorization': `Bearer ${sysToken}` }
                });
                const data = await res.json();
                render(data.productos, query);
            } finally { document.getElementById('loading-spinner').classList.add('hidden'); }
        }

        function render(productos, query) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            document.getElementById('section-title').innerText = query === 'Hikvision' ? "Lo más buscado" : `Resultados: ${query}`;

            productos.forEach(p => {
                const precio = ((parseFloat(p.precios.precio_descuento || p.precios.precio_lista) * CONFIG.tc) / CONFIG.margen) * 1.16;
                const safeTitle = p.titulo.replace(/['"]/g, "");

                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col group">
                        <div class="relative mb-4 bg-gray-50 rounded-xl p-4 h-48 flex items-center justify-center cursor-pointer overflow-hidden" onclick="window.open('${p.link_privado}', '_blank')">
                            <img src="${p.img_portada}" class="max-h-full object-contain mix-blend-multiply group-hover:scale-110 transition-all duration-500">
                            <span class="absolute top-2 right-2 bg-white px-2 py-1 rounded-md text-[8px] font-bold text-blue-600 border uppercase shadow-sm">${p.marca}</span>
                        </div>
                        <div class="flex-1">
                            <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter mb-1">${p.modelo}</p>
                            <h4 class="font-bold text-gray-800 text-xs leading-snug line-clamp-2 h-8 mb-4">${p.titulo}</h4>
                            <p class="text-xl font-black text-gray-900 mb-4">$${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-auto">
                            <button onclick="soporteWA('${p.modelo}', '${safeTitle}')" class="bg-gray-100 text-gray-600 py-3 rounded-xl font-bold text-[9px] uppercase hover:bg-blue-600 hover:text-white transition-all">Soporte</button>
                            <button onclick="addToCart('${p.modelo}', '${safeTitle}', ${precio}, '${p.img_portada}')" class="bg-slate-900 text-white py-3 rounded-xl font-black text-[9px] uppercase hover:bg-green-600 transition-all">Agregar</button>
                        </div>
                    </div>
                `;
            });
        }

        function enviarPedidoWA() {
            if (cart.length === 0) return;
            let total = 0; let lista = "";
            cart.forEach(i => {
                lista += `• *${i.modelo}* x ${i.cant} pza(s) - _${i.titulo}_\n`;
                total += i.precio * i.cant;
            });
            const msg = `Hola equipo de *IMPETEC Ventas*, buen día. 👋\n\nMe gustaría solicitar una cotización formal de los siguientes productos que vi en su catálogo online:\n\n${lista}\n*Total Neto Estimado:* $${total.toLocaleString('es-MX')} MXN\n\n¿Me podrían confirmar disponibilidad y tiempo de entrega? ¡Muchas gracias!`;
            window.open(`https://wa.me/${CONFIG.waVentas}?text=${encodeURIComponent(msg)}`);
        }

        function soporteWA(mod, tit) {
            const msg = `Hola equipo de *Soporte Técnico*, buen día. 👋\n\nRequiero de su amable apoyo o asesoría técnica con el siguiente equipo:\n\n*Modelo:* ${mod}\n*Descripción:* ${tit}\n\nQuedo atento a su respuesta, ¡muchas gracias por su ayuda!`;
            window.open(`https://wa.me/${CONFIG.waSoporte}?text=${encodeURIComponent(msg)}`);
        }

        function filtrar(q) { closeAll(); buscar(q); window.scrollTo({top:0, behavior:'smooth'}); }
        function irAlInicio() { buscar('Hikvision'); window.scrollTo({top:0, behavior:'smooth'}); }
        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') buscar(e.target.value); });
        
        (async () => { await buscar(''); })();
    </script>
</body>
</html>
