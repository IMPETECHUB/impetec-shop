<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC | Catálogo de Ingeniería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --sys-blue: #0056b3; --sys-dark: #1a1d21; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        .product-card { transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #e2e8f0; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); border-color: var(--sys-blue); }
        
        #sidebar { transition: transform 0.3s ease; width: 280px; z-index: 1100; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-slate-800">

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[1050] hidden backdrop-blur-sm" onclick="closeAll()"></div>

    <nav class="sticky top-0 z-[1000] bg-white border-b-2 border-blue-600 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <img src="logo.png" alt="IMPETEC" class="h-8 cursor-pointer" onclick="location.reload()">
            </div>

            <div class="hidden md:flex flex-1 max-w-xl mx-8">
                <div class="relative w-full">
                    <input type="text" id="search-input" placeholder="Buscar modelo o producto..." 
                           class="w-full pl-4 pr-12 py-2 border-2 border-slate-200 rounded-lg focus:border-blue-500 outline-none transition-all">
                    <button onclick="ejecutarBusqueda()" class="absolute right-0 top-0 h-full px-4 text-blue-600 hover:bg-blue-50 rounded-r-lg">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="toggleCart()" class="relative p-2.5 bg-blue-50 text-blue-700 rounded-full hover:bg-blue-100 transition-colors">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <aside id="sidebar" class="fixed left-0 top-0 h-full bg-white shadow-2xl transform -translate-x-full overflow-y-auto">
        <div class="bg-slate-900 text-white p-5 flex justify-between items-center">
            <span class="font-bold tracking-wider text-sm">DEPARTAMENTOS</span>
            <button onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="p-2">
            <div class="text-[11px] font-bold text-slate-400 px-4 py-3 uppercase tracking-widest">Soporte</div>
            <a href="https://wa.me/524772471293" target="_blank" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-blue-600 hover:bg-blue-50 rounded-lg">
                <i class="fas fa-headset"></i> Ingeniería Técnica
            </a>

            <div class="text-[11px] font-bold text-slate-400 px-4 py-3 uppercase tracking-widest mt-4">Categorías</div>
            <button onclick="filtrar('21', 'Videovigilancia')" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg border-b border-slate-50">
                <i class="fas fa-video w-5"></i> Videovigilancia
            </button>
            <button onclick="filtrar('22', 'Redes')" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg border-b border-slate-50">
                <i class="fas fa-wifi w-5"></i> Redes e Inalámbricos
            </button>
            <button onclick="filtrar('23', 'Acceso')" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg border-b border-slate-50">
                <i class="fas fa-fingerprint w-5"></i> Control de Acceso
            </button>
            <button onclick="filtrar('26', 'Alarmas')" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg">
                <i class="fas fa-shield-alt w-5"></i> Alarmas
            </button>
        </nav>
    </aside>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 id="section-title" class="text-3xl font-extrabold text-slate-900 tracking-tight capitalize">Cargando...</h1>
                <p class="text-slate-500 text-sm font-medium">Precios con IVA incluido (TC: $18.50)</p>
            </div>
            <select id="price-filter" onchange="ordenarProductos()" class="bg-white border-2 border-slate-200 rounded-lg px-4 py-2 text-sm font-bold outline-none focus:border-blue-500">
                <option value="default">Relevancia</option>
                <option value="low">Precio: Menor a Mayor</option>
                <option value="high">Precio: Mayor a Menor</option>
            </select>
        </header>

        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="h-80 skeleton rounded-xl"></div>
            <div class="h-80 skeleton rounded-xl"></div>
            <div class="h-80 skeleton rounded-xl"></div>
            <div class="h-80 skeleton rounded-xl"></div>
        </div>
    </main>

    <aside id="cart-sidebar" class="fixed right-0 top-0 h-full bg-white w-full max-w-xs shadow-2xl z-[1100] transform translate-x-full flex flex-col transition-transform duration-300">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h3 class="font-bold text-slate-800">MI PRESUPUESTO</h3>
            <button onclick="toggleCart()" class="text-slate-400 hover:text-red-500"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-6 border-t bg-slate-50 space-y-4">
            <div class="flex justify-between items-center font-bold text-xl text-slate-900">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="enviarPedidoWA()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-lg"></i> SOLICITAR COTIZACIÓN
            </button>
        </div>
    </aside>

    <script>
        const CONFIG = {
            // NOTA: Para GitHub, considera usar un proxy para evitar errores de CORS y proteger tus llaves
            sys_key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            sys_secret: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            waVentas: "524776767350",
            tc: 18.50,
            margen: 0.80 // Equivale a +25% de utilidad
        };

        let sysToken = '';
        let cart = JSON.parse(localStorage.getItem('impetec_cart')) || [];
        let productosActuales = [];

        async function getAuth() {
            try {
                const res = await fetch('https://developers.syscom.mx/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 
                        client_id: CONFIG.sys_key, 
                        client_secret: CONFIG.sys_secret, 
                        grant_type: 'client_credentials' 
                    })
                });
                const data = await res.json();
                sysToken = data.access_token;
                if(!sysToken) throw new Error();
            } catch (e) {
                console.error("Error de autenticación. Verifica tus llaves de Syscom.");
            }
        }

        function showLoading() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = Array(8).fill('<div class="h-80 skeleton rounded-xl"></div>').join('');
        }

        async function filtrar(id, nombre) {
            closeAll();
            showLoading();
            document.getElementById('section-title').innerText = nombre;
            try {
                const res = await fetch(`https://developers.syscom.mx/api/v1/productos?categoria=${id}`, {
                    headers: { 'Authorization': `Bearer ${sysToken}` }
                });
                const data = await res.json();
                productosActuales = data.productos || [];
                render(productosActuales);
            } catch (e) {
                errorState();
            }
        }

        async function buscar(q) {
            showLoading();
            document.getElementById('section-title').innerText = q;
            try {
                const res = await fetch(`https://developers.syscom.mx/api/v1/productos?busqueda=${q}`, {
                    headers: { 'Authorization': `Bearer ${sysToken}` }
                });
                const data = await res.json();
                productosActuales = data.productos || [];
                render(productosActuales);
            } catch (e) {
                errorState();
            }
        }

        function getPrice(p) {
            // Precio lista (USD) -> MXN -> Margen -> IVA
            const base = (parseFloat(p.precios.precio_lista) * CONFIG.tc) / CONFIG.margen;
            return base * 1.16;
        }

        function render(productos) {
            const grid = document.getElementById('products-grid');
            if (productos.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">No se encontraron productos en esta sección.</div>`;
                return;
            }
            
            grid.innerHTML = productos.map(p => {
                const precio = getPrice(p);
                return `
                    <div class="product-card bg-white rounded-xl p-4 flex flex-col">
                        <div class="relative h-48 mb-4 flex items-center justify-center bg-white">
                            <img src="${p.img_portada}" loading="lazy" class="max-h-full object-contain">
                            <span class="absolute top-0 left-0 bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-1 rounded">${p.marca}</span>
                        </div>
                        <div class="flex-1">
                            <p class="text-blue-600 text-[10px] font-extrabold uppercase mb-1">${p.modelo}</p>
                            <h4 class="text-sm font-semibold text-slate-800 line-clamp-2 h-10 mb-2">${p.titulo}</h4>
                            <p class="text-2xl font-black text-slate-900">$${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
                        </div>
                        <div class="mt-4 space-y-2">
                            <button onclick="addToCart('${p.modelo}', '${p.titulo.replace(/'/g, "")}', ${precio}, '${p.img_portada}')" 
                                    class="w-full bg-slate-900 text-white py-2.5 rounded-lg font-bold text-xs hover:bg-blue-600 transition-colors">
                                AÑADIR AL PRESUPUESTO
                            </button>
                            <button onclick="ventasDirecto('${p.modelo}')" 
                                    class="w-full border-2 border-green-500 text-green-600 py-2 rounded-lg font-bold text-xs flex items-center justify-center gap-2 hover:bg-green-50 transition-colors">
                                <i class="fab fa-whatsapp"></i> STOCK EN TIEMPO REAL
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- FUNCIONES DE CARRITO (CON LOCALSTORAGE) ---
        function addToCart(mod, tit, price, img) {
            const index = cart.findIndex(i => i.modelo === mod);
            if (index > -1) cart[index].cant++;
            else cart.push({ modelo: mod, titulo: tit, precio: price, img: img, cant: 1 });
            
            saveAndRefresh();
            if(window.innerWidth > 768) toggleCart(); // Abre carrito en PC
        }

        function saveAndRefresh() {
            localStorage.setItem('impetec_cart', JSON.stringify(cart));
            actualizarUI();
        }

        function actualizarUI() {
            const itemsCont = document.getElementById('cart-items');
            let total = 0; let count = 0;
            
            itemsCont.innerHTML = cart.map((i, idx) => {
                total += i.precio * i.cant;
                count += i.cant;
                return `
                    <div class="flex gap-3 items-center bg-white p-2 rounded-lg border border-slate-100">
                        <img src="${i.img}" class="w-12 h-12 object-contain">
                        <div class="flex-1">
                            <p class="text-[11px] font-bold line-clamp-1">${i.modelo}</p>
                            <p class="text-[10px] text-slate-500">$${i.precio.toLocaleString()} x ${i.cant}</p>
                        </div>
                        <button onclick="removeItem(${idx})" class="text-slate-300 hover:text-red-500 px-2">
                            <i class="fas fa-trash-alt text-xs"></i>
                        </button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('cart-count').innerText = count;
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            saveAndRefresh();
        }

        // --- UTILIDADES ---
        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function toggleCart() {
            const s = document.getElementById('cart-sidebar');
            const o = document.getElementById('overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function closeAll() {
            document.getElementById('sidebar').style.transform = 'translateX(-100%)';
            document.getElementById('cart-sidebar').style.transform = 'translateX(100%)';
            document.getElementById('overlay').style.display = 'none';
        }

        function enviarPedidoWA() {
            if (cart.length === 0) return alert("El presupuesto está vacío");
            let mensaje = "Hola IMPETEC, me gustaría cotizar lo siguiente:%0A%0A";
            cart.forEach(i => { mensaje += `• ${i.modelo} (${i.cant} pz)%0A`; });
            window.open(`https://wa.me/${CONFIG.waVentas}?text=${mensaje}`);
        }

        function ventasDirecto(mod) {
            window.open(`https://wa.me/${CONFIG.waVentas}?text=Hola, ¿tienen disponibilidad del modelo ${mod}?`);
        }

        function ordenarProductos() {
            const val = document.getElementById('price-filter').value;
            if(val === 'low') productosActuales.sort((a, b) => getPrice(a) - getPrice(b));
            if(val === 'high') productosActuales.sort((a, b) => getPrice(b) - getPrice(a));
            render(productosActuales);
        }

        function ejecutarBusqueda() {
            const q = document.getElementById('search-input').value;
            if(q) buscar(q);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') ejecutarBusqueda(); });

        function errorState() {
            document.getElementById('products-grid').innerHTML = `<div class="col-span-full py-20 text-center">
                <i class="fas fa-exclamation-triangle text-4xl text-amber-500 mb-4"></i>
                <p class="font-bold">Error de conexión con Syscom</p>
                <p class="text-sm text-slate-500">Intenta buscar de nuevo en unos segundos.</p>
            </div>`;
        }

        // Iniciar APP
        (async () => {
            actualizarUI();
            await getAuth();
            buscar('Hikvision'); // Carga inicial
        })();
    </script>
</body>
</html>
