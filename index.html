<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC | Soluciones de Ingeniería</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --brand-blue: #0052ff; --brand-dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; }

        /* Tarjetas Reforzadas (Anti-amontonamiento) */
        .product-card { 
            display: flex; flex-direction: column; height: 100%; min-height: 480px;
            background: white; border-radius: 12px; border: 1px solid #e2e8f0; 
            transition: all 0.3s ease;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.08); border-color: var(--brand-blue); }
        
        .img-wrap { height: 180px; display: flex; align-items: center; justify-content: center; padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .info-wrap { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .p-title { font-size: 13px; font-weight: 700; color: #334155; line-height: 1.3; min-height: 34px; margin-bottom: 8px; overflow: hidden; }
        .p-model { font-size: 10px; font-weight: 800; color: var(--brand-blue); text-transform: uppercase; margin-bottom: 4px; }
        .p-desc { font-size: 11px; color: #64748b; line-height: 1.4; margin-bottom: 15px; flex-grow: 1; }
        .p-price { font-size: 20px; font-weight: 900; color: #0f172a; margin-bottom: 12px; }

        /* Sidebar & Overlay */
        #sidebar { transition: 0.3s; z-index: 1000; width: 280px; background: white; position: fixed; height: 100%; top: 0; left: 0; transform: translateX(-100%); }
        .sidebar-open #sidebar { transform: translateX(0); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 900; backdrop-filter: blur(2px); }
        .sidebar-open .overlay { display: block; }

        /* Scrollbar estética */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="shadow-2xl overflow-y-auto">
        <div class="p-6 bg-gray-900 text-white flex justify-between items-center">
            <span class="font-black italic text-lg">IMPETEC</span>
            <button onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="p-4">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 px-2">Ingenierías</p>
            <button onclick="filtrar('Videovigilancia')" class="w-full text-left p-3 text-sm font-semibold hover:bg-blue-50 rounded-lg mb-1"><i class="fas fa-video mr-3 opacity-50"></i> Videovigilancia</button>
            <button onclick="filtrar('Redes')" class="w-full text-left p-3 text-sm font-semibold hover:bg-blue-50 rounded-lg mb-1"><i class="fas fa-wifi mr-3 opacity-50"></i> Redes e Inalámbricos</button>
            <button onclick="filtrar('Acceso')" class="w-full text-left p-3 text-sm font-semibold hover:bg-blue-50 rounded-lg mb-1"><i class="fas fa-fingerprint mr-3 opacity-50"></i> Control de Acceso</button>
            <hr class="my-4">
            <a href="https://wa.me/524772471293" target="_blank" class="w-full flex items-center p-3 text-sm font-bold text-blue-600 bg-blue-50 rounded-lg">
                <i class="fas fa-headset mr-3"></i> Soporte Técnico
            </a>
        </nav>
    </aside>

    <nav class="bg-white border-b sticky top-0 z-50 px-4 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg"><i class="fas fa-bars"></i></button>
            <span class="text-xl font-black tracking-tighter text-gray-900">IMPETEC</span>
        </div>
        <div class="flex-1 max-w-lg mx-6">
            <input type="text" id="search" placeholder="Buscar modelo o tecnología..." class="w-full bg-gray-100 border-none rounded-xl py-2 px-5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleCart()" class="relative p-2"><i class="fas fa-shopping-basket text-xl text-gray-700"></i><span id="c-count" class="absolute top-0 right-0 bg-red-600 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span></button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <h2 id="title" class="text-xl font-extrabold text-gray-800 mb-8 border-l-4 border-blue-600 pl-4 uppercase tracking-tight">Cargando Soluciones...</h2>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <script>
        const API = {
            key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            sec: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            waV: "524776767350",
            waS: "524772471293",
            tc: 18.50,
            mg: 0.80
        };

        let token = '';
        let cart = [];

        function toggleMenu() { document.body.classList.toggle('sidebar-open'); }

        async function init() {
            const res = await fetch('https://developers.syscom.mx/oauth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: API.key, client_secret: API.sec, grant_type: 'client_credentials' })
            });
            const data = await res.json();
            token = data.access_token;
            buscar('');
        }

        async function buscar(q) {
            const res = await fetch(`https://developers.syscom.mx/api/v1/productos?busqueda=${q || 'Cámara'}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            render(data.productos);
            document.getElementById('title').innerText = q ? `Resultados: ${q}` : "Equipos Destacados";
        }

        function render(prods) {
            const grid = document.getElementById('grid');
            grid.innerHTML = prods.map(p => {
                const precio = ((parseFloat(p.precios.precio_lista) * API.tc) / API.mg) * 1.16;
                return `
                    <div class="product-card">
                        <div class="img-wrap"><img src="${p.img_portada}" class="max-h-full"></div>
                        <div class="info-wrap">
                            <span class="p-model">${p.modelo}</span>
                            <h4 class="p-title">${p.titulo}</h4>
                            <p class="p-desc">Equipo profesional de alta gama. Contacte con ingeniería para asesoría técnica en su proyecto.</p>
                            <p class="p-price">$${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
                            <div class="flex gap-2">
                                <button onclick="window.open('https://wa.me/${API.waS}?text=Soporte para: ${p.modelo}')" class="flex-1 bg-gray-100 py-2 rounded-lg text-[10px] font-extrabold hover:bg-gray-200">SOPORTE</button>
                                <button onclick="add('${p.modelo}', ${precio})" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-[10px] font-extrabold hover:bg-blue-700">AÑADIR</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function add(mod, price) {
            cart.push({ mod, price });
            document.getElementById('c-count').innerText = cart.length;
            alert('Añadido al presupuesto');
        }

        function filtrar(q) { toggleMenu(); buscar(q); }
        document.getElementById('search').addEventListener('keypress', (e) => { if(e.key === 'Enter') buscar(e.target.value); });

        init();
    </script>
</body>
</html>
