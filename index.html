<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC | Soluciones Tecnológicas</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --brand-blue: #0062ff; --brand-dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; }

        /* Sidebar mejorado */
        #sidebar { transition: transform 0.3s ease; z-index: 1000; width: 280px; background: white; }
        .nav-group-title { padding: 12px 20px; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-item { display: flex; align-items: center; padding: 10px 20px; font-size: 14px; font-weight: 600; color: #475569; transition: 0.2s; width: 100%; text-align: left; }
        .nav-item:hover { background: #f8fafc; color: var(--brand-blue); }
        .nav-item i { width: 24px; font-size: 16px; margin-right: 10px; opacity: 0.7; }

        /* Tarjetas sin amontonamiento */
        .product-card { 
            display: flex; flex-direction: column; height: 100%; 
            background: white; border-radius: 16px; border: 1px solid #e2e8f0; 
            transition: all 0.3s ease; overflow: hidden;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: var(--brand-blue); }
        
        .img-container { height: 200px; display: flex; align-items: center; justify-content: center; padding: 20px; background: #fff; }
        .content-container { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        /* Ajuste de texto para evitar encimado */
        .product-title { font-size: 13px; line-height: 1.4; font-weight: 600; color: #334155; margin-bottom: 8px; min-height: 40px; }
        .product-model { font-size: 11px; font-weight: 800; color: var(--brand-blue); margin-bottom: 4px; text-transform: uppercase; }
        .product-desc { font-size: 12px; color: #64748b; line-height: 1.5; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        #cart-sidebar { transition: transform 0.3s ease; z-index: 1000; width: 350px; box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        .sidebar-overlay { background: rgba(15, 23, 42, 0.5); display: none; z-index: 900; position: fixed; inset: 0; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeAll()"></div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full transform -translate-x-full overflow-y-auto shadow-xl">
        <div class="p-6 bg-gray-900 text-white">
            <h2 class="text-xl font-extrabold italic">IMPETEC</h2>
        </div>
        <nav class="mt-4">
            <div class="nav-group-title">Sistemas de Seguridad</div>
            <button onclick="filtrar('Videovigilancia')" class="nav-item"><i class="fas fa-video"></i> CCTV</button>
            <button onclick="filtrar('Acceso')" class="nav-item"><i class="fas fa-fingerprint"></i> Control de Acceso</button>
            <button onclick="filtrar('Alarma')" class="nav-item"><i class="fas fa-shield-alt"></i> Alarmas</button>
            
            <div class="nav-group-title">Conectividad</div>
            <button onclick="filtrar('Redes')" class="nav-item"><i class="fas fa-wifi"></i> Redes</button>
            <button onclick="filtrar('Cable')" class="nav-item"><i class="fas fa-project-diagram"></i> Cableado</button>
            
            <div class="nav-group-title">Marcas</div>
            <button onclick="filtrar('Hikvision')" class="nav-item">Hikvision</button>
            <button onclick="filtrar('Ubiquiti')" class="nav-item">Ubiquiti</button>
        </nav>
    </aside>

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-100 rounded-lg"><i class="fas fa-bars text-xl"></i></button>
            <span class="text-2xl font-black text-gray-900 tracking-tighter">IMPETEC</span>
        </div>
        <div class="flex-1 max-w-xl mx-10">
            <div class="relative">
                <input type="text" id="search-input" placeholder="Buscar productos..." class="w-full bg-gray-100 border-none rounded-xl py-2 px-10 focus:ring-2 focus:ring-blue-500">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
        </div>
        <button onclick="toggleCart()" class="relative p-2 text-gray-600">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <h1 id="section-title" class="text-2xl font-bold mb-8">Nuestros Equipos</h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="products-grid">
            </div>
    </main>

    <aside id="cart-sidebar" class="fixed right-0 top-0 h-full bg-white transform translate-x-full flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="font-bold text-lg">Mi Presupuesto</h3>
            <button onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t">
            <div class="flex justify-between mb-4 font-bold">
                <span>Total:</span>
                <span id="cart-total">$0.00</span>
            </div>
            <button onclick="enviarPedidoWA()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">
                <i class="fab fa-whatsapp mr-2"></i> Solicitar Cotización
            </button>
        </div>
    </aside>

    <script>
        const CONFIG = {
            sys_key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            sys_secret: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            waVentas: "524776767350",
            waSoporte: "524772471293",
            tc: 18.50,
            margen: 0.80
        };

        let sysToken = '';
        let cart = [];

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('sidebar-overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function toggleCart() {
            const s = document.getElementById('cart-sidebar');
            const o = document.getElementById('sidebar-overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function closeAll() {
            document.getElementById('sidebar').style.transform = 'translateX(-100%)';
            document.getElementById('cart-sidebar').style.transform = 'translateX(100%)';
            document.getElementById('sidebar-overlay').style.display = 'none';
        }

        async function auth() {
            const res = await fetch('https://developers.syscom.mx/oauth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ client_id: CONFIG.sys_key, client_secret: CONFIG.sys_secret, grant_type: 'client_credentials' })
            });
            const data = await res.json();
            sysToken = data.access_token;
            buscar('');
        }

        async function buscar(q) {
            const res = await fetch(`https://developers.syscom.mx/api/v1/productos?busqueda=${q || 'Hikvision'}`, {
                headers: { 'Authorization': `Bearer ${sysToken}` }
            });
            const data = await res.json();
            render(data.productos);
        }

        function render(productos) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = productos.map(p => {
                const precio = ((parseFloat(p.precios.precio_lista) * CONFIG.tc) / CONFIG.margen) * 1.16;
                return `
                    <div class="product-card">
                        <div class="img-container">
                            <img src="${p.img_portada}" class="max-h-full object-contain">
                        </div>
                        <div class="content-container">
                            <p class="product-model">${p.modelo}</p>
                            <h4 class="product-title">${p.titulo}</h4>
                            <p class="product-desc">Consulte especificaciones técnicas y compatibilidad con nuestro equipo de ingeniería.</p>
                            <p class="text-xl font-black mb-6 mt-auto">$${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="soporteWA('${p.modelo}')" class="bg-gray-100 text-gray-700 py-2 rounded-lg text-xs font-bold hover:bg-gray-200">SOPORTE</button>
                                <button onclick="addToCart('${p.modelo}', '${p.titulo}', ${precio}, '${p.img_portada}')" class="bg-gray-900 text-white py-2 rounded-lg text-xs font-bold hover:bg-blue-600">AGREGAR</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(mod, tit, price, img) {
            const item = cart.find(i => i.modelo === mod);
            if (item) item.cant++;
            else cart.push({ modelo: mod, titulo: tit, precio: price, img: img, cant: 1 });
            actualizarUI();
        }

        function actualizarUI() {
            const items = document.getElementById('cart-items');
            let total = 0;
            items.innerHTML = cart.map(i => {
                total += i.precio * i.cant;
                return `<div class="flex gap-4 border-b pb-4"><img src="${i.img}" class="w-12 h-12 object-contain"><div><p class="text-xs font-bold">${i.modelo}</p><p class="text-[10px] text-gray-500">${i.cant} pza(s)</p></div></div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-MX')}`;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function enviarPedidoWA() {
            let lista = cart.map(i => `• ${i.modelo} x ${i.cant}`).join('%0A');
            window.open(`https://wa.me/${CONFIG.waVentas}?text=Hola IMPETEC, solicito cotización de:%0A${lista}`);
        }

        function soporteWA(mod) {
            window.open(`https://wa.me/${CONFIG.waSoporte}?text=Hola, necesito soporte técnico para el equipo: ${mod}`);
        }

        auth();
    </script>
</body>
</html>
