<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC - Soluciones Tecnológicas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); border-color: #3b82f6; }
        
        /* Banner Style */
        .hero-gradient { background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%); }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-24 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="IMPETEC" class="h-14 w-auto object-contain">
            </div>

            <div class="flex-1 max-w-lg mx-8">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="¿Qué equipo estás buscando hoy?" 
                        class="w-full bg-slate-100 border-none rounded-2xl py-3 px-12 font-semibold text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>

            <div>
                <a href="https://wa.me/524772471293?text=Hola,%20necesito%20soporte%20técnico." target="_blank" 
                   class="bg-blue-50 text-blue-600 px-5 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all flex items-center gap-2 border border-blue-100">
                    <i class="fas fa-tools text-sm"></i>
                    Soporte Técnico
                </a>
            </div>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto px-4 mt-8">
        <div class="hero-gradient rounded-[2.5rem] p-10 md:p-16 text-white relative overflow-hidden shadow-2xl shadow-blue-200">
            <div class="relative z-10 max-w-2xl">
                <span class="bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-6 inline-block">Tecnología de Vanguardia</span>
                <h2 class="text-4xl md:text-5xl font-extrabold leading-tight mb-4">Seguridad y Redes <br> para tu Hogar o Empresa</h2>
                <p class="text-blue-100 text-sm md:text-base font-medium mb-8 opacity-80">Explora nuestro catálogo con los mejores equipos de videovigilancia, control de acceso y telecomunicaciones.</p>
                <div class="flex gap-4">
                    <button onclick="buscar('Hikvision')" class="bg-white text-blue-600 px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-lg hover:scale-105 transition-transform">Ver Novedades</button>
                </div>
            </div>
            <i class="fas fa-shield-alt absolute -right-10 -bottom-10 text-[20rem] text-white/10 rotate-12"></i>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-xl font-extrabold text-slate-900 tracking-tight" id="section-title">Productos Destacados</h3>
            <div id="loading-spinner" class="hidden">
                <div class="animate-spin rounded-full h-5 w-5 border-2 border-blue-600 border-t-transparent"></div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="products-grid">
            </div>
    </main>

    <script>
        const CONFIG = {
            key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            secret: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            proxy: "https://cors-anywhere.herokuapp.com/",
            waVentas: "524776767350",
            tipoCambio: 18.50, 
            margen: 0.80
        };

        let token = '';

        async function iniciar() {
            try {
                const res = await fetch(CONFIG.proxy + 'https://developers.syscom.mx/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CONFIG.key,
                        client_secret: CONFIG.secret,
                        grant_type: 'client_credentials'
                    })
                });
                const data = await res.json();
                token = data.access_token;
                buscar(''); 
            } catch (err) {
                console.error("Error al autenticar.");
            }
        }

        async function buscar(query) {
            if (!token) return;
            const grid = document.getElementById('products-grid');
            const spinner = document.getElementById('loading-spinner');
            const title = document.getElementById('section-title');
            
            spinner.classList.remove('hidden');
            title.innerText = query ? `Resultados para: ${query}` : "Productos Destacados";

            try {
                const q = query || 'Hikvision'; 
                const res = await fetch(`${CONFIG.proxy}https://developers.syscom.mx/api/v1/productos?busqueda=${q}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                renderizar(data.productos);
            } catch (err) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-slate-400 font-bold">Ocurrió un error al cargar los productos.</p>';
            } finally {
                spinner.classList.add('hidden');
            }
        }

        function renderizar(productos) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            if(!productos || productos.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-slate-400 font-bold">No se encontraron equipos disponibles.</p>';
                return;
            }

            productos.forEach(p => {
                const costoUSD = parseFloat(p.precios.precio_descuento || p.precios.precio_especial || p.precios.precio_lista) || 0;
                const precioFinal = ((costoUSD * CONFIG.tipoCambio) / CONFIG.margen) * 1.16;

                if(precioFinal > 0) {
                    grid.innerHTML += `
                        <div class="product-card bg-white rounded-[2rem] p-6 flex flex-col border border-slate-100">
                            <div class="relative mb-6 bg-slate-50 rounded-[1.5rem] p-4 h-52 flex items-center justify-center">
                                <img src="${p.img_portada}" class="max-h-full object-contain mix-blend-multiply" onerror="this.src='https://via.placeholder.com/300?text=IMPETEC'">
                                <span class="absolute top-3 right-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[9px] font-black text-blue-600 border border-blue-50 uppercase tracking-tighter italic">
                                    ${p.marca}
                                </span>
                            </div>
                            
                            <div class="flex-1 px-1">
                                <p class="text-[10px] font-black text-blue-600 uppercase tracking-wider mb-1">${p.modelo}</p>
                                <h4 class="font-bold text-slate-800 text-[13px] leading-snug line-clamp-2 h-10">${p.titulo}</h4>
                            </div>

                            <div class="mt-6 pt-6 border-t border-slate-50">
                                <div class="flex items-baseline gap-1">
                                    <span class="text-2xl font-black text-slate-900">$${precioFinal.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">MXN</span>
                                </div>
                                <div class="flex items-center gap-1.5 mt-1 text-green-600">
                                    <i class="fas fa-check-circle text-[10px]"></i>
                                    <p class="text-[10px] font-bold uppercase tracking-tighter">Neto con IVA Incluido</p>
                                </div>
                                
                                <button onclick="enviarWA('${p.modelo}', '${p.titulo}')" 
                                    class="w-full mt-6 bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-3 hover:bg-blue-600 transition-all shadow-xl shadow-slate-200">
                                    <i class="fab fa-whatsapp text-lg text-green-400"></i>
                                    Comprar ahora
                                </button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function enviarWA(mod, tit) {
            const msg = `Hola Impetec, me interesa el equipo:\nModelo: ${mod}\nDescripción: ${tit}\n¿Me pueden confirmar disponibilidad?`;
            window.open(`https://wa.me/${CONFIG.waVentas}?text=${encodeURIComponent(msg)}`);
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscar(e.target.value);
        });

        iniciar();
    </script>
</body>
</html>
