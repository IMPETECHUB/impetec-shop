<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC | Distribuidor Autorizado </title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --sys-blue: #0056b3; --sys-dark: #1a1d21; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #333; }

        /* Estilos del Sidebar Syscom */
        #sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; width: 320px; background: white; border-right: 1px solid #ddd; }
        .sidebar-header { background: var(--sys-dark); color: white; padding: 20px; }
        .nav-group-title { background: #e2e8f0; color: #475569; padding: 10px 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #cbd5e1; }
        .nav-item { display: flex; align-items: center; padding: 10px 20px; font-size: 13px; font-weight: 600; color: #334155; border-bottom: 1px solid #f1f5f9; transition: 0.2s; width: 100%; text-align: left; background: none; border-left: none; border-right: none; }
        .nav-item:hover { background: #f0f7ff; color: var(--sys-blue); padding-left: 25px; }
        .nav-item i { width: 22px; color: #94a3b8; margin-right: 8px; }
        
        .sub-nav-item { padding: 8px 20px 8px 45px; font-size: 12px; color: #64748b; display: block; width: 100%; text-align: left; border-bottom: 1px solid #f8fafc; background: none; }
        .sub-nav-item:hover { color: var(--sys-blue); background: #f1f5f9; }

        #cart-sidebar { transition: all 0.4s ease; z-index: 1000; width: 380px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
        .sidebar-overlay { background: rgba(0,0,0,0.5); display: none; z-index: 900; position: fixed; inset: 0; backdrop-filter: blur(4px); }
        
        .product-card { transition: all 0.3s; background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--sys-blue); }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); transition: 0.3s; z-index: 2000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeAll()"></div>

    <div id="toast" class="bg-blue-800 text-white px-8 py-4 rounded-xl shadow-2xl flex items-center gap-4">
        <i class="fas fa-check-circle"></i>
        <span class="text-xs font-bold uppercase tracking-widest">Presupuesto actualizado</span>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-full transform -translate-x-full overflow-y-auto flex flex-col shadow-2xl">
        <div class="sidebar-header">
            <div class="flex justify-between items-center">
                <span class="font-bold text-xl italic tracking-tighter text-white">IMPETEC <span class="text-blue-500">PRO</span></span>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <nav class="flex-1 pb-10">
            <div class="nav-group-title">Ingenierías</div>
            <button onclick="filtrar('Videovigilancia')" class="nav-item"><i class="fas fa-video"></i> Videovigilancia</button>
            <button onclick="filtrar('Redes')" class="nav-item"><i class="fas fa-wifi"></i> Redes e Inalámbricos</button>
            <button onclick="filtrar('Acceso')" class="nav-item"><i class="fas fa-fingerprint"></i> Control de Acceso</button>
            <button onclick="filtrar('Intrusión')" class="nav-item"><i class="fas fa-shield-alt"></i> Alarmas e Intrusión</button>

            <div class="nav-group-title">Tipos de Cámaras</div>
            <button onclick="filtrar('Cámara IP')" class="sub-nav-item">• Cámaras IP</button>
            <button onclick="filtrar('Cámara Análoga')" class="sub-nav-item">• Cámaras Análogas</button>
            <button onclick="filtrar('Cámara PTZ')" class="sub-nav-item">• Cámaras Robóticas (PTZ)</button>
            <button onclick="filtrar('WiFi')" class="sub-nav-item">• Cámaras WiFi</button>

            <div class="nav-group-title">Marcas Principales</div>
            <button onclick="filtrar('Hikvision')" class="nav-item font-bold text-red-600">HIKVISION</button>
            <button onclick="filtrar('Epcom')" class="nav-item font-bold text-blue-800">EPCOM</button>
            <button onclick="filtrar('Ubiquiti')" class="nav-item font-bold text-blue-400">UBIQUITI</button>

            <div class="nav-group-title">Soporte Técnico</div>
            <a href="https://wa.me/524772471293?text=Hola%20equipo%20de%20Soporte%20T%C3%A9cnico%2C%20buen%20d%C3%ADa.%20Solicito%20su%20amable%20asesor%C3%ADa%20con%20un%20proyecto." 
               target="_blank" class="nav-item text-blue-600 font-bold">
                <i class="fas fa-headset text-blue-600"></i> Ingeniería Especializada
            </a>
        </nav>
    </aside>

    <aside id="cart-sidebar" class="fixed right-0 top-0 h-full bg-white transform translate-x-full flex flex-col shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center bg-gray-50">
            <div>
                <h3 class="font-bold text-lg">TU PEDIDO</h3>
                <p id="items-total-count" class="text-xs font-bold text-blue-600">0 Artículos</p>
            </div>
            <button onclick="toggleCart()"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        <div class="p-6 border-t bg-white">
            <div class="flex justify-between items-center mb-4">
                <span class="font-bold text-gray-400">Total aprox:</span>
                <span class="text-2xl font-bold" id="cart-total">$0.00</span>
            </div>
            <button onclick="enviarPedidoWA()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold uppercase hover:bg-green-700 transition-all flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> Enviar a Ventas
            </button>
        </div>
    </aside>

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-lg hover:bg-blue-600 hover:text-white transition-all">
                    <i class="fas fa-bars"></i>
                </button>
                <img src="logo.png" onclick="irAlInicio()" class="h-8 cursor-pointer" alt="Logo">
            </div>
            <div class="flex-1 max-w-xl mx-8 hidden md:block">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Buscar en Syscom..." class="w-full bg-gray-100 rounded-lg py-2 px-10 focus:bg-white border focus:border-blue-500 outline-none transition-all">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative w-10 h-10 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <header class="mb-10 flex justify-between items-end border-b pb-6">
            <h2 class="text-3xl font-bold text-gray-900" id="section-title">Lo más buscado</h2>
            <div id="loading-spinner" class="hidden text-blue-600 font-bold text-xs uppercase animate-pulse">Consultando Syscom...</div>
        </header>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="products-grid"></div>
    </main>

    <script>
        const CONFIG = {
            sys_key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            sys_secret: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            waVentas: "524776767350",
            waSoporte: "524772471293",
            tc: 18.50,
            margen: 0.80
        };

        let sysToken = '';
        let cart = [];

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('sidebar-overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function toggleCart() {
            const s = document.getElementById('cart-sidebar');
            const o = document.getElementById('sidebar-overlay');
            const isOpen = s.style.transform === 'translateX(0px)';
            s.style.transform = isOpen ? 'translateX(100%)' : 'translateX(0px)';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function closeAll() {
            document.getElementById('sidebar').style.transform = 'translateX(-100%)';
            document.getElementById('cart-sidebar').style.transform = 'translateX(100%)';
            document.getElementById('sidebar-overlay').style.display = 'none';
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function authSYSCOM() {
            try {
                const res = await fetch('https://developers.syscom.mx/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 
                        client_id: CONFIG.sys_key, 
                        client_secret: CONFIG.sys_secret, 
                        grant_type: 'client_credentials' 
                    })
                });
                const data = await res.json();
                sysToken = data.access_token;
            } catch (e) { console.error("Error Auth"); }
        }

        async function buscar(q) {
            if (!sysToken) await authSYSCOM();
            document.getElementById('loading-spinner').classList.remove('hidden');
            const query = q || 'Hikvision';
            try {
                const res = await fetch(`https://developers.syscom.mx/api/v1/productos?busqueda=${query}`, { 
                    headers: { 'Authorization': `Bearer ${sysToken}` }
                });
                const data = await res.json();
                render(data.productos, query);
            } finally { document.getElementById('loading-spinner').classList.add('hidden'); }
        }

        function render(productos, query) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            document.getElementById('section-title').innerText = query === 'Hikvision' ? "Equipos Destacados" : query;

            productos.forEach(p => {
                const precio = ((parseFloat(p.precios.precio_descuento || p.precios.precio_lista) * CONFIG.tc) / CONFIG.margen) * 1.16;
                const safeTitle = p.titulo.replace(/['"]/g, "");

                grid.innerHTML += `
                    <div class="product-card p-4 flex flex-col">
                        <div class="relative mb-4 bg-gray-50 rounded h-40 flex items-center justify-center cursor-pointer" onclick="window.open('${p.link_privado}', '_blank')">
                            <img src="${p.img_portada}" class="max-h-full object-contain">
                            <span class="absolute top-2 right-2 bg-white px-2 py-1 rounded text-[8px] font-bold border">${p.marca}</span>
                        </div>
                        <p class="text-[10px] font-bold text-blue-600 uppercase mb-1">${p.modelo}</p>
                        <h4 class="font-bold text-gray-800 text-xs leading-tight line-clamp-2 h-8 mb-4">${p.titulo}</h4>
                        <p class="text-xl font-bold text-gray-900 mb-4">$${precio.toLocaleString('es-MX', {minimumFractionDigits: 2})}</p>
                        <div class="grid grid-cols-2 gap-2 mt-auto">
                            <button onclick="soporteWA('${p.modelo}', '${safeTitle}')" class="bg-gray-100 text-gray-600 py-2 rounded font-bold text-[9px] hover:bg-blue-600 hover:text-white transition-all">SOPORTE</button>
                            <button onclick="addToCart('${p.modelo}', '${safeTitle}', ${precio}, '${p.img_portada}')" class="bg-gray-900 text-white py-2 rounded font-bold text-[9px] hover:bg-green-600 transition-all">AGREGAR</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(mod, tit, price, img) {
            const item = cart.find(i => i.modelo === mod);
            if (item) item.cant++;
            else cart.push({ modelo: mod, titulo: tit, precio: price, img: img, cant: 1 });
            actualizarUI();
            showToast();
        }

        function updateQuantity(mod, delta) {
            const item = cart.find(i => i.modelo === mod);
            if (item) {
                item.cant += delta;
                if (item.cant < 1) cart = cart.filter(i => i.modelo !== mod);
                actualizarUI();
            }
        }

        function actualizarUI() {
            const container = document.getElementById('cart-items');
            let total = 0; let count = 0;
            container.innerHTML = cart.map(item => {
                total += item.precio * item.cant;
                count += item.cant;
                return `
                    <div class="bg-gray-50 p-3 rounded border flex gap-2 items-center">
                        <img src="${item.img}" class="w-10 h-10 object-contain">
                        <div class="flex-1">
                            <h5 class="text-[9px] font-bold">${item.titulo}</h5>
                            <div class="flex items-center gap-2 mt-1">
                                <button onclick="updateQuantity('${item.modelo}', -1)" class="w-4 h-4 bg-white border rounded text-[10px]">-</button>
                                <span class="text-xs font-bold">${item.cant}</span>
                                <button onclick="updateQuantity('${item.modelo}', 1)" class="w-4 h-4 bg-white border rounded text-[10px]">+</button>
                            </div>
                        </div>
                        <p class="text-xs font-bold">$${(item.precio * item.cant).toLocaleString('es-MX')}</p>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('items-total-count').innerText = `${count} Artículos`;
        }

        function enviarPedidoWA() {
            if (cart.length === 0) return;
            let lista = "";
            cart.forEach(i => lista += `• *${i.modelo}* (${i.cant} pza) - ${i.titulo}\n`);
            const msg = `Hola equipo de *IMPETEC Ventas*, buen día. 👋\n\nMe gustaría solicitar una cotización de:\n\n${lista}\n\n¡Muchas gracias!`;
            window.open(`https://wa.me/${CONFIG.waVentas}?text=${encodeURIComponent(msg)}`);
        }

        function soporteWA(mod, tit) {
            const msg = `Hola equipo de *Soporte Técnico*, buen día. 👋\n\nRequiero asesoría técnica con:\n*Modelo:* ${mod}\n*Descripción:* ${tit}\n\n¡Gracias por su apoyo!`;
            window.open(`https://wa.me/${CONFIG.waSoporte}?text=${encodeURIComponent(msg)}`);
        }

        function filtrar(q) { closeAll(); buscar(q); }
        function irAlInicio() { buscar('Hikvision'); }
        document.getElementById('search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') buscar(e.target.value); });
        
        buscar('');
    </script>
</body>
</html>
