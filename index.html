<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPETEC SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); border-color: #3b82f6; }
        
        #loading-state { min-height: 300px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-24 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="IMPETEC Logo" class="h-16 w-auto object-contain">
                <div class="hidden sm:block">
                    <h1 class="text-xl font-black text-slate-900 leading-none tracking-tight">SHOP</h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Soluciones tecnológicas</p>
                </div>
            </div>

            <div class="flex-1 max-w-lg mx-8">
                <div class="relative">
                    <input type="text" id="search-input" placeholder="Buscar cámaras, redes, alarmas..." 
                        class="w-full bg-slate-100 border-none rounded-2xl py-3 px-12 font-semibold text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>

            <div>
                <a href="https://wa.me/524772471293?text=Hola,%20necesito%20soporte%20técnico." target="_blank" 
                   class="bg-slate-100 text-slate-700 px-5 py-3 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-slate-200 transition-all flex items-center gap-2">
                    <i class="fas fa-tools text-blue-600"></i>
                    Soporte Técnico
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div id="loading-state" class="hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent"></div>
        </div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="products-grid">
            </div>
    </main>

    <script>
        // CONFIGURACIÓN INTERNA
        const CONFIG = {
            key: 'hjJRFGddL5yMqIo10i0hHvzJbYdVV60B',
            secret: 'iKoJKeO1IC8Zw9DUpWUyVgv4ZOjfv0SDFNnTHI7r',
            proxy: "https://cors-anywhere.herokuapp.com/",
            waVentas: "524776767350",
            tipoCambio: 18.50, 
            margen: 0.80       // /.80
        };

        let token = '';

        async function iniciar() {
            try {
                const res = await fetch(CONFIG.proxy + 'https://developers.syscom.mx/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CONFIG.key,
                        client_secret: CONFIG.secret,
                        grant_type: 'client_credentials'
                    })
                });
                const data = await res.json();
                token = data.access_token;
                // Carga inicial de productos Hikvision
                buscar(''); 
            } catch (err) {
                console.error("Error de conexión");
            }
        }

        async function buscar(query) {
            if (!token) return;
            const grid = document.getElementById('products-grid');
            const loader = document.getElementById('loading-state');
            
            loader.classList.remove('hidden');
            grid.classList.add('opacity-20');

            try {
                const q = query || 'Hikvision'; 
                const res = await fetch(`${CONFIG.proxy}https://developers.syscom.mx/api/v1/productos?busqueda=${q}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                renderizar(data.productos);
            } catch (err) {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-400 font-bold">Sin resultados encontrados.</p>';
            } finally {
                loader.classList.add('hidden');
                grid.classList.remove('opacity-20');
            }
        }

        function renderizar(productos) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            if(!productos || productos.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-400 py-20 font-bold">No encontramos productos con ese nombre.</p>';
                return;
            }

            productos.forEach(p => {
                // Usar precio_descuento (usuario) o precio_lista como respaldo
                const costoUSD = parseFloat(p.precios.precio_descuento || p.precios.precio_especial || p.precios.precio_lista) || 0;
                
                // FÓRMULA: ((Costo * TC) / 0.8) * 1.16
                const precioBaseMXN = costoUSD * CONFIG.tipoCambio;
                const precioConMargen = precioBaseMXN / CONFIG.margen;
                const precioFinal = precioConMargen * 1.16;

                if(precioFinal > 0) {
                    grid.innerHTML += `
                        <div class="product-card bg-white rounded-[2.5rem] p-6 flex flex-col">
                            <div class="relative mb-5 bg-slate-50 rounded-3xl p-4 h-48 flex items-center justify-center">
                                <img src="${p.img_portada}" class="max-h-full object-contain mix-blend-multiply" onerror="this.src='https://via.placeholder.com/300?text=IMPETEC'">
                                <span class="absolute top-3 left-3 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[8px] font-black text-slate-400 border border-slate-100 uppercase tracking-widest">${p.marca}</span>
                            </div>
                            
                            <div class="flex-1">
                                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-tight">${p.modelo}</p>
                                <h4 class="font-bold text-slate-800 text-[13px] mt-1 leading-tight line-clamp-2 h-10">${p.titulo}</h4>
                            </div>

                            <div class="mt-6 pt-6 border-t border-slate-50">
                                <div class="flex items-baseline gap-1">
                                    <span class="text-2xl font-black text-slate-900">$${precioFinal.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">MXN</span>
                                </div>
                                <p class="text-[9px] text-green-600 font-black uppercase mt-1">IVA Incluido</p>
                                
                                <button onclick="enviarWA('${p.modelo}', '${p.titulo}')" 
                                    class="w-full mt-5 bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 hover:bg-blue-600 transition-all shadow-xl shadow-slate-100">
                                    <i class="fab fa-whatsapp text-lg text-green-400"></i>
                                    Comprar ahora
                                </button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function enviarWA(mod, tit) {
            const msg = `Hola Impetec Shop, me interesa el equipo:\nModelo: ${mod}\nDescripción: ${tit}\n¿Me pueden confirmar disponibilidad?`;
            window.open(`https://wa.me/${CONFIG.waVentas}?text=${encodeURIComponent(msg)}`);
        }

        // Buscador al presionar Enter
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscar(e.target.value);
        });

        iniciar();
    </script>
</body>
</html>
